# ============================================================
# Inventory Valuation Tracking - docker-compose.yml
#
# 使用方式：
#   docker compose build       # 构建镜像
#   docker compose up -d       # 启动守护进程
#     - 每月1日 00:15 自动从 Infor CSI API 生成期初库存文件
#       (API 不可用时降级为 SQL 直连 SLItems 表)
#     - 每天 09:00 自动运行库存报表并发送邮件
#   docker compose logs -f     # 查看日志
#   docker compose down        # 停止（调度随之停止）
#
# 首次部署：
#   docker network create public-net
#   docker compose build
#   docker compose up -d
# ============================================================

version: "3.9"

services:
  app:
    build: .
    container_name: nai-inventory-tracker
    restart: unless-stopped   # 守护模式：进程退出后自动重启

    # 挂载目录（宿主机路径:容器路径）
    volumes:
      - ./Previous Balance:/app/Previous Balance        # 期初文件（可读写，脚本会自动生成）
      - ./reports:/app/reports                          # 报表输出（可写）
      - ./config.ini:/app/config.ini:ro                 # 配置文件（只读）

    # 所有配置通过 .env 注入（优先于 config.ini）
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1      # 日志实时输出（避免 Docker 缓冲）
      # 邮件
      - MAIL_TO=${MAIL_TO}
      - MAIL_CC=${MAIL_CC}
      - MAIL_FROM=${MAIL_FROM}
      # SMTP
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_TLS=${SMTP_TLS}
      # 数据库（SQL fallback 用）
      - SQL_SERVER_HOST=${SQL_SERVER_HOST}
      - SQL_SERVER_PORT=${SQL_SERVER_PORT}
      - SQL_SERVER_DATABASE=${SQL_SERVER_DATABASE}
      - SQL_SERVER_USERNAME=${SQL_SERVER_USERNAME}
      - SQL_SERVER_PASSWORD=${SQL_SERVER_PASSWORD}
      # Infor CSI API — 期初库存抓取（OAuth2 自动获取 Token）
      # 推荐配置 OAuth2 凭据（与 csi_datawarehouse 共用）：
      #   INFOR_AUTH_BASIC = Base64(client_id:client_secret)
      #   INFOR_USERNAME = Infor 用户名
      #   INFOR_PASSWORD = Infor 密码
      - INFOR_AUTH_BASIC=${INFOR_AUTH_BASIC}
      - INFOR_USERNAME=${INFOR_USERNAME}
      - INFOR_PASSWORD=${INFOR_PASSWORD}
      # Token 端点（留空则自动构造）
      - INFOR_TOKEN_URL=${INFOR_TOKEN_URL}
      # 降级：手动 Bearer Token（不推荐，OAuth2 凭据已配置时可忽略）
      - INFOR_BEARER_TOKEN=${INFOR_BEARER_TOKEN}

    networks:
      - public-net

# 外部 Docker 网络（需预先创建：docker network create public-net）
networks:
  public-net:
    external: true
